spring:
  application:
    name: englishapp

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/englishapp}
    username: ${DATABASE_USER:englishapp}
    password: ${DATABASE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:devSecretKeyNeedsToBeAtLeast32CharsLong!}
    expire-hours: 24
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket-videos: ${S3_BUCKET_VIDEOS:videos}
    bucket-audios: ${S3_BUCKET_AUDIOS:audios}
    public-url-base: ${S3_PUBLIC_URL:http://localhost:9000}
  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
