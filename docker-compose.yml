services:
  postgres:
    image: postgres:16-alpine
    container_name: englishapp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: englishapp
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: englishapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U englishapp -d englishapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: englishapp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: englishapp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address :9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  init-buckets:
    image: minio/mc:latest
    container_name: englishapp-init-buckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/videos;
      mc mb --ignore-existing local/audios;
      mc anonymous set download local/videos;
      mc anonymous set download local/audios;
      echo 'Buckets initialized.';
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
